name: Run tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, redis, pdo_sqlite, sodium
          tools: composer, symfony


      - name: Cache composer packages
        uses: actions/cache@v4
        id: cache_composer
        env:
          cache-name: cache-composer-modules
          APP_ENV: test
          APP_DEBUG: 1
          fail-fast: true
        with:
          path: vendor
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-


      - if: ${{ steps.cache_composer.outputs.cache-hit != 'true' }}
        name: install composer
        continue-on-error: true
        env:
          APP_ENV: test
        run:
          composer install

      - name: setup tests
        env:
          APP_ENV: test
          APP_DEBUG: 1
          APP_ID: kantine
          fail-fast: true
        run: |
          mkdir apps/zeiterfassung/templates
          php bin/console secrets:generate-keys
          php bin/console secrets:set APP_SECRET --random
          php bin/console secrets:set JWT_PASSPHRASE --random
          php bin/console lexik:jwt:generate-keypair
          
          php bin/console importmap:install
          php bin/console doctrine:database:create
          php bin/console doctrine:schema:update --force
          php bin/console doctrine:fixtures:load --quiet

      - name: run tests
        env:
          APP_ENV: test
          APP_DEBUG: 1
          APP_ID: kantine
          fail-fast: true
        run: php bin/phpunit --display-deprecations


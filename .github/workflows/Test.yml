name: Run tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, redis, pdo_sqlite
          tools: composer, symfony
          
      
      - name: Install composer packages and Generate secrets
        env:
          APP_ENV: test
          APP_DEBUG: 1
          fail-fast: true
        run: \
          # compile assets
          symfony asset-map:compile --env=test

          # secrets 
          symfony secrets:generate-keys --env=test
          symfony secrets:set APP_SECRET --random --env=test
          symfony secrets:set JWT_PASSPHRASE --random --env=test
          symfony lexik:jwt:generate-keypair --env=test

      - name: run tests
          run: \
            php bin/phpunit --display-deprecations



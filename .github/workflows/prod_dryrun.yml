name: Run tests

on:
  workflow_dispatch:


jobs:
  prod:
    name: Setup
    runs-on: ubuntu-latest
    env: 
      cache-name-composer: cache-composer-modules
      cache-name-assets: cache-symfony-assets
      APP_ID: kantine
      APP_ENV: prod
      APP_DEBUG: 0
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, redis, pdo_sqlite, sodium
          tools: composer, symfony

      - name: setup prod
        run: |
          mkdir apps/zeiterfassung/templates
          composer install --no-dev --optimize-autoloaders
          php bin/console secrets:generate-keys
          php bin/console secrets:set APP_SECRET --random
          php bin/console secrets:set JWT_PASSPHRASE --random
          php bin/console lexik:jwt:generate-keypair
          
          php bin/console importmap:install
          # compile assets
          php bin/console asset-map:compile

          # some optimizations
          composer dump-autoload --no-dev --classmap-authoritative


